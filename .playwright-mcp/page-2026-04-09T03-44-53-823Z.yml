              - listitem [ref=e118]:
                - generic [ref=e119]: "Lightning-fast:"
                - text: Forget SMS delays. WhatsApp messages are delivered in seconds, allowing users to log in or verify transactions without frustrating waits.
              - listitem [ref=e120]:
                - generic [ref=e121]: "Globally cost-effective:"
