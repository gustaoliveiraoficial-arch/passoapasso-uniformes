            - paragraph [ref=e105]: Why should you switch from SMS to a smarter authentication solution?
            - paragraph [ref=e106]: Customer trust is the bedrock of business growth, and securing that trust begins with protecting your customers' data. However, if your security process creates friction and feels outdated, it can undermine that trust. WhatsApp authentication messages offer a powerful solution to this common problem.
          - paragraph [ref=e110]:
            - generic [ref=e111]: WhatsApp authentication messaging fundamentally changes the game.
            - text: By leveraging the world's most popular messaging app, you meet customers on a platform they already use and trust daily.
          - generic [ref=e112]:
            - paragraph [ref=e113]:
              - text: For years, SMS has been the default for sending one-time passcodes. While functional, it has flaws. Delays, deliverability issues, and a lack of branding can make the process feel disjointed and insecure. Customers are left wondering if the message is legitimate, all while waiting for a code that might get lost.
              - generic [ref=e114]: When you send authentication messages via WhatsApp
              - text: ", you deliver an experience that is:"
            - list [ref=e115]:
              - listitem [ref=e116]:
                - generic [ref=e117]: "Instantly recognizable:"
